<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f11;
      --bg2: #13131a;
      --bg3: #16161f;
      --border: #1e1e2e;
      --border2: #2a2a3e;
      --gold: #c9a96e;
      --gold2: #b8933a;
      --text: #e8e4dc;
      --muted: #7a7a9a;
      --dim: #4a4a6a;
      --green: #4caf7d;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .brand-name {
      font-size: 14px;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* JOB CONTEXT */
    .job-context {
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .job-context-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      margin-bottom: 6px;
    }

    .job-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .job-input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 6px 9px;
      color: var(--text);
      font-size: 11px;
      font-family: 'Georgia', serif;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .job-input:focus { border-color: var(--gold); }
    .job-input::placeholder { color: var(--dim); }
    .job-input.full-width { grid-column: 1 / -1; }

    /* QUESTIONS SECTION */
    .questions-section {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      font-family: 'Courier New', monospace;
    }

    .scan-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 4px 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .scan-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* QUESTION CARD */
    .question-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .question-card:hover { border-color: #3a3a5a; }

    .q-header {
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
    }

    .q-type-badge {
      font-size: 9px;
      font-family: 'Courier New', monospace;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .q-type-badge.essay { background: #1a2a1a; color: #4caf7d; border: 1px solid #2a4a2a; }
    .q-type-badge.motivation { background: #2a1a0a; color: var(--gold); border: 1px solid #4a3a1a; }
    .q-type-badge.experience { background: #0a1a2a; color: #6ab0e8; border: 1px solid #1a3a5a; }
    .q-type-badge.custom { background: #1a1a2a; color: var(--muted); border: 1px solid var(--border2); }

    .q-text {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      flex: 1;
    }

    .q-toggle {
      color: var(--dim);
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .q-body {
      padding: 0 12px 12px;
      display: none;
    }
    .q-body.open { display: block; }

    .answer-area {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: 'Georgia', serif;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    .answer-area:focus { border-color: var(--gold); }
    .answer-area::placeholder { color: var(--dim); }

    .q-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .q-btn {
      padding: 6px 11px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }

    .q-btn-generate {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0f0f11;
      font-weight: bold;
    }
    .q-btn-generate:hover { opacity: 0.9; }
    .q-btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .q-btn-inject {
      background: #1a2e1a;
      color: var(--green);
      border: 1px solid #2a4a2a;
    }
    .q-btn-inject:hover { background: #1e3a1e; }

    .q-btn-copy {
      background: var(--bg2);
      color: var(--muted);
      border: 1px solid var(--border2);
    }
    .q-btn-copy:hover { border-color: var(--gold); color: var(--gold); }

    .generating-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Courier New', monospace;
    }

    .dots span {
      animation: blink 1.2s infinite;
      opacity: 0;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

    /* CUSTOM QUESTION */
    .custom-q-section {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
      background: var(--bg2);
    }

    .custom-q-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      font-family: 'Courier New', monospace;
      margin-bottom: 6px;
    }

    .custom-q-row {
      display: flex;
      gap: 6px;
    }

    .custom-q-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: 'Georgia', serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .custom-q-input:focus { border-color: var(--gold); }
    .custom-q-input::placeholder { color: var(--dim); }

    .custom-q-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      border-radius: 4px;
      padding: 7px 14px;
      color: #0f0f11;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .custom-q-btn:hover { opacity: 0.9; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--dim);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 12px; line-height: 1.6; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2e1a;
      color: var(--green);
      border: 1px solid #2a4a2a;
      border-radius: 5px;
      padding: 7px 14px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error {
      background: #2e1a1a;
      color: #e87878;
      border-color: #4a2a2a;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="brand">
      <div class="logo">✦</div>
      <span class="brand-name">AI Assistant</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="autoFillBtn">⚡ Auto-Fill</button>
      <button class="icon-btn" id="scanPageBtn">🔍 Scan</button>
    </div>
  </div>
</div>

<div class="job-context">
  <div class="job-context-label">Job Context (helps tailor answers)</div>
  <div class="job-inputs">
    <input class="job-input" id="jobCompany" placeholder="Company name" type="text">
    <input class="job-input" id="jobTitle" placeholder="Role / title" type="text">
    <input class="job-input full-width" id="jobNotes" placeholder="Any notes about this role or why you're interested..." type="text">
  </div>
</div>

<div class="questions-section" id="questionsSection">
  <div class="section-header">
    <span class="section-title">Questions & Answers</span>
    <button class="scan-btn" id="scanBtn">Scan Page</button>
  </div>

  <div id="questionsList">
    <div class="empty-state">
      <div class="icon">✦</div>
      <p>Scan the page to detect questions,<br>or add a custom question below.</p>
    </div>
  </div>
</div>

<div class="custom-q-section">
  <div class="custom-q-label">Add a Question Manually</div>
  <div class="custom-q-row">
    <input class="custom-q-input" id="customQuestion" placeholder="e.g. Why do you want to work here?">
    <button class="custom-q-btn" id="addCustomQ">Generate</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="src/sidepanel.js"></script>
</body>
</html>
